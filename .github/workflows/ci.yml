name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a PR is updated. Stale builds against an old
# commit aren't useful and burn CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict Sources Tests

  build-test:
    name: Build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Test against the oldest supported macOS (LSMinimumSystemVersion is 13)
    # and the current image. macos-13 catches platform-API regressions early;
    # macos-14 reflects what most users run.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Cache vendored JS/CSS
        uses: actions/cache@v4
        with:
          path: Resources/web/vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('scripts/fetch-vendor.sh') }}

      - name: Fetch vendor (no-op if cached)
        run: make fetch-vendor

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version
          node --version

      - name: Test
        run: make test

      - name: Build app bundle
        run: make app

      - name: Verify bundle layout
        run: |
          test -x Markee.app/Contents/MacOS/Markee
          test -f Markee.app/Contents/Info.plist
          test -f Markee.app/Contents/Resources/LICENSE
          test -f Markee.app/Contents/Resources/THIRD-PARTY-NOTICES.md
          test -d Markee.app/Contents/Resources/web/vendor

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Markee.app-${{ matrix.os }}-${{ github.sha }}
          path: Markee.app
          if-no-files-found: error
